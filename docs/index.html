<title>Webduct — Interactive Demo</title>
<style>
  :root {
    --primary:#673ab7; --primary-dark:#512da8; --primary-050:#ede7f6; --accent:#ffc107;
    --success:#2e7d32; --danger:#c62828; --ground:#f4f3f7; --surface:#fff; --line:#e4e1ea;
    --ink:#201b29; --ink-2:#5b5566; --ink-3:#8b8496;
    --shadow:0 1px 2px rgba(20,14,33,.08),0 2px 8px rgba(20,14,33,.06);
    --radius:12px; --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  }
  @media (prefers-color-scheme:dark){:root{
    --primary:#b39ddb;--primary-dark:#9575cd;--primary-050:#2a2340;--accent:#ffca28;--success:#66bb6a;--danger:#ef9a9a;
    --ground:#14111c;--surface:#1e1a29;--line:#2e2839;--ink:#ece9f2;--ink-2:#b3adc0;--ink-3:#837c92;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 2px 10px rgba(0,0,0,.35);}}
  :root[data-theme="dark"]{--primary:#b39ddb;--primary-dark:#9575cd;--primary-050:#2a2340;--accent:#ffca28;--success:#66bb6a;--danger:#ef9a9a;--ground:#14111c;--surface:#1e1a29;--line:#2e2839;--ink:#ece9f2;--ink-2:#b3adc0;--ink-3:#837c92;--shadow:0 1px 2px rgba(0,0,0,.4),0 2px 10px rgba(0,0,0,.35);}
  :root[data-theme="light"]{--primary:#673ab7;--primary-dark:#512da8;--primary-050:#ede7f6;--accent:#ffc107;--success:#2e7d32;--danger:#c62828;--ground:#f4f3f7;--surface:#fff;--line:#e4e1ea;--ink:#201b29;--ink-2:#5b5566;--ink-3:#8b8496;--shadow:0 1px 2px rgba(20,14,33,.08),0 2px 8px rgba(20,14,33,.06);}

  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--font);background:var(--ground);color:var(--ink);-webkit-font-smoothing:antialiased;}
  button{font-family:inherit;cursor:pointer;}
  svg{display:block;}
  a{color:var(--primary-dark);}
  .icon{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
  .num{font-variant-numeric:tabular-nums;}
  h1.page{font-size:28px;font-weight:700;margin:0 0 20px;letter-spacing:-.4px;text-wrap:balance;}

  /* Toolbar */
  .toolbar{height:60px;background:var(--primary);color:#fff;display:flex;align-items:center;padding:0 16px;gap:10px;position:sticky;top:0;z-index:20;}
  .toolbar .brand{font-weight:600;font-size:20px;}
  .toolbar .spacer{flex:1;}
  .tbtn{background:transparent;border:0;color:#fff;display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border-radius:8px;font-size:14px;font-weight:500;}
  .tbtn:hover{background:rgba(255,255,255,.14);}
  .cart-badge{position:relative;}
  .cart-badge b{position:absolute;top:-6px;right:-8px;background:var(--accent);color:#241c00;font-size:11px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:grid;place-items:center;padding:0 4px;}

  /* Shell */
  .shell{display:grid;grid-template-columns:236px 1fr;min-height:calc(100vh - 60px);}
  .sidenav{background:var(--surface);border-right:1px solid var(--line);padding:12px 8px;}
  .navlink{display:flex;align-items:center;gap:14px;padding:12px 16px;border-radius:10px;color:var(--ink-2);font-weight:500;font-size:15px;border:0;background:transparent;width:100%;text-align:left;}
  .navlink:hover{background:var(--primary-050);color:var(--ink);}
  .navlink.active{background:var(--primary-050);color:var(--primary-dark);}
  .content{padding:26px clamp(16px,4vw,40px);max-width:1160px;}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);}
  .card+.card{margin-top:18px;}
  .card>h2{font-size:16px;font-weight:600;margin:0;padding:16px 20px 2px;display:flex;align-items:center;gap:8px;}
  .card .sub{color:var(--ink-3);font-size:13px;padding:0 20px 4px;}
  .card .body{padding:14px 20px 20px;}
  .section-head{display:flex;align-items:center;gap:8px;padding:16px 20px;cursor:pointer;user-select:none;}
  .section-head h2{font-size:16px;font-weight:600;margin:0;flex:1;}
  .section-head .chev{transition:transform .2s;color:var(--ink-3);}
  .section.collapsed .body{display:none;}
  .section.collapsed .chev{transform:rotate(-90deg);}

  table{width:100%;border-collapse:collapse;}
  thead th{text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-3);font-weight:600;padding:12px 14px;border-bottom:1px solid var(--line);}
  tbody td{padding:12px 14px;border-bottom:1px solid var(--line);font-size:14.5px;vertical-align:middle;}
  tbody tr:last-child td{border-bottom:0;}
  .r{text-align:right;}.c{text-align:center;}
  .sku{color:var(--ink-3);font-size:12px;}
  .chip{display:inline-block;padding:3px 11px;border-radius:999px;background:var(--primary-050);color:var(--primary-dark);font-size:12px;font-weight:600;}
  .chip.gray{background:var(--line);color:var(--ink-2);}

  .btn{border:0;border-radius:9px;padding:10px 18px;font-size:14px;font-weight:600;display:inline-flex;align-items:center;gap:8px;}
  .btn.primary{background:var(--primary);color:#fff;} .btn.primary:hover{background:var(--primary-dark);}
  .btn.ghost{background:transparent;color:var(--primary-dark);} .btn.ghost:hover{background:var(--primary-050);}
  .btn.stroked{background:transparent;color:var(--ink);border:1px solid var(--line);} .btn.stroked:hover{border-color:var(--primary);color:var(--primary-dark);}
  .btn.danger{background:transparent;color:var(--danger);border:1px solid var(--line);}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  .iconbtn{background:transparent;border:0;border-radius:8px;padding:7px;color:var(--ink-2);display:inline-grid;place-items:center;}
  .iconbtn:hover{background:var(--primary-050);color:var(--primary-dark);}
  .iconbtn.d:hover{background:color-mix(in srgb,var(--danger) 16%,transparent);color:var(--danger);}

  .field{display:flex;flex-direction:column;gap:6px;}
  .field label{font-size:12.5px;color:var(--ink-2);font-weight:600;}
  .field input,.field select,.field textarea{font-family:inherit;font-size:15px;padding:10px 12px;border-radius:9px;border:1px solid var(--line);background:var(--ground);color:var(--ink);width:100%;}
  .field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--primary);outline-offset:-1px;border-color:var(--primary);}
  .field .err{color:var(--danger);font-size:12px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
  .switch{display:inline-flex;align-items:center;gap:8px;font-size:14px;color:var(--ink);}
  .rte{min-height:90px;border:1px solid var(--line);border-radius:9px;background:var(--ground);padding:10px 12px;}
  .rte:focus{outline:2px solid var(--primary);outline-offset:-1px;}
  .rte-tools{display:flex;gap:2px;margin-bottom:6px;}
  .rte-tools button{border:1px solid var(--line);background:var(--surface);border-radius:6px;width:32px;height:30px;color:var(--ink-2);}
  .rte-tools button:hover{color:var(--primary-dark);border-color:var(--primary);}

  .qty{display:inline-flex;align-items:center;gap:4px;}.qty b{min-width:26px;text-align:center;}
  .order-layout{display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start;}
  .summary{position:sticky;top:80px;}
  .sum-row{display:flex;justify-content:space-between;padding:6px 0;}.sum-row span{color:var(--ink-2);}
  .sum-row.grand{font-size:19px;font-weight:700;border-top:1px solid var(--line);padding-top:11px;margin-top:4px;}
  .full{width:100%;justify-content:center;}

  /* Login */
  .login-wrap{min-height:100vh;display:grid;place-items:center;background:radial-gradient(120% 120% at 50% 0%,var(--primary-050),var(--ground));padding:20px;}
  .login-card{width:380px;max-width:100%;background:var(--surface);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);overflow:hidden;}
  .login-card .top{height:5px;background:linear-gradient(90deg,var(--primary),var(--accent));}
  .login-card .in{padding:30px 28px 26px;}
  .login-card h1{margin:0 0 4px;font-size:26px;} .login-card p.tag{margin:0 0 22px;color:var(--ink-3);font-size:14px;}
  .login-card .field{margin-bottom:14px;} .hint{margin-top:14px;color:var(--ink-3);font-size:12px;text-align:center;}

  /* Confirmation */
  .confirm{max-width:560px;margin:20px auto;text-align:center;padding:38px 32px;}
  .confirm .ok{width:70px;height:70px;margin:0 auto 10px;border-radius:50%;background:color-mix(in srgb,var(--success) 16%,transparent);display:grid;place-items:center;}
  .confirm .ok svg{width:38px;height:38px;stroke:var(--success);}
  .confirm h1{font-size:25px;margin:6px 0 8px;} .confirm .onum{font-size:18px;margin:0 0 14px;} .confirm .onum b{color:var(--primary-dark);}
  .confirm .msg{color:var(--ink-2);margin:3px 0;font-size:14px;}
  .confirm .totals{display:flex;justify-content:center;gap:34px;margin:22px 0;}
  .confirm .totals div{display:flex;flex-direction:column;} .confirm .totals span{color:var(--ink-3);font-size:12px;} .confirm .totals b{font-size:19px;}

  /* 3D */
  .stage{height:230px;border-radius:10px;background:linear-gradient(160deg,var(--primary-050),var(--ground));display:grid;place-items:center;perspective:900px;overflow:hidden;}
  .duct{position:relative;transform-style:preserve-3d;animation:spin 14s linear infinite;}
  @media (prefers-reduced-motion:reduce){.duct{animation:none;transform:rotateX(-16deg) rotateY(35deg);}}
  @keyframes spin{from{transform:rotateX(-16deg) rotateY(0);}to{transform:rotateX(-16deg) rotateY(360deg);}}
  .face{position:absolute;background:linear-gradient(#c3c9d2,#9aa2ad);border:1px solid #7b828d;}
  .stage-cap{text-align:center;color:var(--ink-3);font-size:12px;margin-top:8px;}

  /* Modal */
  .scrim{position:fixed;inset:0;background:rgba(20,14,33,.5);display:grid;place-items:center;z-index:60;padding:16px;}
  .modal{background:var(--surface);border-radius:14px;box-shadow:var(--shadow);width:640px;max-width:100%;max-height:90vh;overflow:auto;}
  .modal .mhead{display:flex;align-items:center;padding:18px 22px;border-bottom:1px solid var(--line);}
  .modal .mhead h2{margin:0;font-size:18px;flex:1;} .modal .mbody{padding:20px 22px;} .modal .mfoot{display:flex;justify-content:flex-end;gap:10px;padding:16px 22px;border-top:1px solid var(--line);}
  .cfg-preview{display:flex;justify-content:space-between;gap:16px;background:var(--primary-050);border-radius:10px;padding:14px 16px;margin-top:6px;}
  .cfg-preview div{display:flex;flex-direction:column;} .cfg-preview span{font-size:12px;color:var(--ink-2);} .cfg-preview b{font-size:18px;}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:#322b40;color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;opacity:0;transition:.25s;z-index:80;box-shadow:var(--shadow);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .ribbon{background:color-mix(in srgb,var(--accent) 22%,var(--surface));border:1px solid color-mix(in srgb,var(--accent) 50%,var(--line));border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:18px;}
  .empty{text-align:center;padding:44px 0;color:var(--ink-2);}
  .empty .icon{width:44px;height:44px;margin:0 auto 12px;color:var(--ink-3);}
  .list-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);}
  .list-item:last-child{border-bottom:0;}
  .spec-line{color:var(--ink-3);font-size:12px;}

  @media (max-width:880px){
    .shell{grid-template-columns:1fr;}
    .sidenav{display:flex;gap:6px;overflow-x:auto;border-right:0;border-bottom:1px solid var(--line);position:sticky;top:60px;z-index:15;}
    .navlink{white-space:nowrap;} .order-layout{grid-template-columns:1fr;} .summary{position:static;} thead{display:none;}
  }
</style>

<div id="app"></div>
<div id="modal-root"></div>
<div class="toast" id="toast"></div>

<script>
"use strict";
/* ============================================================
   Webduct interactive demo — single-file, in-browser (localStorage).
   Feature-parity with the reverse-engineered Webduct ordering module.
   NOTE: sample data + demo pricing. Part fields/pricing live in PART_TYPES
   and PRICING so real specs (Stage 2) can drop in as a data edit.
   ============================================================ */

// ---------- Icons ----------
const I = {

  paper:'<svg class="icon"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><path d="M13 2v7h7"/></svg>',
};

const PART_TYPES = {

  elbow: {

    fields:[

      {id:'width',label:'Width (in)',kind:'number',def:24,min:2},
      {id:'height',label:'Height (in)',kind:'number',def:12,min:2},
      {id:'throat',label:'Throat Radius (in)',kind:'number',def:6,min:0},
      {id:'vanes',label:'Turning Vanes',kind:'select',options:['None','Single','Double'],def:'None'},

  straight: {
    name:'Rectangular Straight', category:'Straight Duct', icon:I.cube,
    fields:[

      {id:'height',label:'Height (in)',kind:'number',def:12,min:2},
      {id:'length',label:'Length (in)',kind:'number',def:60,min:6},

  tee: {

      {id:'material',label:'Material',kind:'select',options:MATERIAL,def:'Galvanized'},
      {id:'connector',label:'Connector',kind:'select',options:CONNECTORS,def:'TDC'},
      {id:'insulation',label:'Insulation',kind:'select',options:INSUL,def:'None'},
    ],
    shape:'tee',
  },
};

// ---------- Pricing / weight (demo formulas; swappable in Stage 2) ----------
const PRICING = {
  gaugeWtPerSqFt:{ '26':0.906,'24':1.156,'22':1.406,'20':1.656,'18':2.156 }, // galvanized lb/sqft
  materialMult:{ 'Galvanized':1, 'Paint Grip':1.1, 'Aluminum':0.9, 'Stainless':2.4 },
  materialWtMult:{ 'Galvanized':1, 'Paint Grip':1, 'Aluminum':0.37, 'Stainless':1.03 },
  fabPerSqFt:14.5,
  connectorAdd:{ 'TDC':6,'TDF':7,'S&Drive':3,'Raw Edge':0 },
  insulAddPerSqFt:{ 'None':0,'1"':1.6,'1.5"':2.1,'2"':2.7 },
  vanesAdd:{ 'None':0,'Single':18,'Double':30 },
  // surface area in square feet for each shape
  areaSqFt(t, s){
    const P=(w,h)=>2*(Number(w)+Number(h));
    const num=v=>Number(v)||0;
    let inSq;
    switch(t){
      case 'straight': inSq=P(s.width,s.height)*num(s.length); break;
      case 'round': inSq=Math.PI*num(s.diameter)*num(s.length); break;
      case 'sq2round':{ const perim=(P(s.topW,s.topH)+Math.PI*num(s.botDia))/2; const slant=Math.hypot(num(s.length),Math.hypot(num(s.offsetX),num(s.offsetY))); inSq=perim*slant; break; }
      case 'transition':{ const perim=(P(s.topW,s.topH)+P(s.botW,s.botH))/2; const slant=Math.hypot(num(s.length),Math.hypot(num(s.offsetX),num(s.offsetY))); inSq=perim*slant; break; }
      case 'offset':{ const slant=Math.hypot(num(s.length),Math.hypot(num(s.offsetX),num(s.offsetY))); inSq=P(s.width,s.height)*slant; break; }
      case 'tee': inSq=P(s.width,s.height)*num(s.length)+P(s.branchW,s.branchH)*Math.max(num(s.branchW),num(s.branchH)); break;
      case 'elbow':{ const r=num(s.throat)+num(s.height)/2; const arc=2*Math.PI*r*(Number(s.angle)/360); inSq=P(s.width,s.height)*Math.max(arc,num(s.height)); break; }
      default: inSq=P(s.width||12,s.height||12)*(num(s.length)||12);
    }
    return Math.max(inSq/144, 0.5);
  },
  estimate(typeId, spec){
    const t=PART_TYPES[typeId]; if(!t) return {price:0,weight:0,area:0};
    const area=this.areaSqFt(t.shape, spec);
    const g=spec.gauge||'24'; const mat=spec.material||'Galvanized';
    const baseWt=(this.gaugeWtPerSqFt[g]||1.156)*(this.materialWtMult[mat]||1);
    let weight=area*baseWt;
    let price=area*this.fabPerSqFt*(this.materialMult[mat]||1);
    price+=(this.connectorAdd[spec.connector]||0);
    price+=area*(this.insulAddPerSqFt[spec.insulation]||0);
    price+=(this.vanesAdd[spec.vanes]||0);
    // small fitting complexity surcharge
    if(['sq2round','transition','offset','tee','elbow'].includes(t.shape)) price*=1.18;
    if(Number(spec.offsetX)||Number(spec.offsetY)) price*=1.06;
    return { price:Math.round(price*100)/100, weight:Math.round(weight*10)/10, area:Math.round(area*10)/10 };
  }
};

<script>
// ---------- Part configurator ----------
function openConfigurator(product, existingSpec, editItemId){
  const t=PART_TYPES[product.typeId];
  const spec=existingSpec?structuredCloneSafe(existingSpec):defaultSpec(product.typeId);
  const fieldsHtml=t.fields.map(f=>{
    if(f.kind==='select'){
      return `<div class="field"><label>${esc(f.label)}</label><select data-fid="${f.id}" onchange="cfgChange('${product.id}','${f.id}',this.value)">${f.options.map(o=>`<option ${String(spec[f.id])===String(o)?'selected':''}>${esc(o)}</option>`).join('')}</select></div>`;
    }
    return `<div class="field"><label>${esc(f.label)}</label><input type="${f.kind==='number'?'number':'text'}" data-fid="${f.id}" value="${esc(spec[f.id])}" oninput="cfgChange('${product.id}','${f.id}',this.value)"></div>`;
  }).join('');
  window.__cfg={ product, spec, editItemId };
  const est=PRICING.estimate(product.typeId,spec);
  openModal(`<div class="modal">
    <div class="mhead">${t.icon}<h2 style="margin-left:8px">Configure — ${esc(product.name)}</h2><button class="iconbtn" onclick="closeModal()">${I.del}</button></div>
    <div class="mbody">
      <div class="grid">${fieldsHtml}</div>
      <div class="cfg-preview" id="cfg-preview">
        <div><span>Unit price</span><b class="num" id="cfg-price">${money(est.price)}</b></div>
        <div><span>Unit weight</span><b class="num" id="cfg-weight">${est.weight} lb</b></div>
        <div><span>Sheet area</span><b class="num" id="cfg-area">${est.area} ft²</b></div>
        <div class="field" style="min-width:80px"><label>Qty</label><input id="cfg-qty" type="number" value="1" min="1" style="width:80px"></div>
      </div>
    </div>
    <div class="mfoot"><button class="btn ghost" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="cfgConfirm()">${editItemId?'Update line':'Add to cart'}</button></div>
  </div>`);
}
function cfgChange(pid,fid,val){
  const c=window.__cfg; if(!c) return;
  const f=PART_TYPES[c.product.typeId].fields.find(x=>x.id===fid);
  c.spec[fid]=f.kind==='number'?(val===''?'':Number(val)):val;
  const est=PRICING.estimate(c.product.typeId,c.spec);
  document.getElementById('cfg-price').textContent=money(est.price);
  document.getElementById('cfg-weight').textContent=est.weight+' lb';
  document.getElementById('cfg-area').textContent=est.area+' ft²';
}
function specSummary(typeId,spec){
  const t=PART_TYPES[typeId]; const parts=[];
  for(const f of t.fields){ const v=spec[f.id]; if(v===''||v==null||v==='None'||v===0) continue; parts.push(f.label.replace(/\s*\(.*\)/,'')+': '+v); }
  return parts.slice(0,6).join(' · ');
}
function cfgConfirm(){
  const c=window.__cfg; if(!c) return;
  const qty=Math.max(1,Number(document.getElementById('cfg-qty').value)||1);
  const est=PRICING.estimate(c.product.typeId,c.spec);
  if(c.editItemId){
    const it=store.data.cart.find(x=>x.id===c.editItemId);
    if(it){ it.spec=structuredCloneSafe(c.spec); it.qty=qty; it.unitPrice=est.price; it.unitWeight=est.weight; }
  } else {
    store.data.cart.push({ id:uid('ci'), productId:c.product.id, name:c.product.name, sku:c.product.sku, kind:'configurable', typeId:c.product.typeId, spec:structuredCloneSafe(c.spec), qty, unitPrice:est.price, unitWeight:est.weight });
  }
  store.save(); closeModal(); toast(c.product.name+' '+(c.editItemId?'updated':'added to cart')); render();
}
</script>

      <div class="row">${attrs.map(f=>`<span class="chip gray">${esc(f.label)}</span>`).join('')}</div>`;
  }
  return `<div class="grid">
    <div class="field"><label>Base price</label><input type="number" step="0.01" value="${esc(p.price)}" oninput="__p.price=Number(this.value)"></div>
    <div class="field"><label>Weight (lb)</label><input type="number" step="0.1" value="${esc(p.weight)}" oninput="__p.weight=Number(this.value)"></div>
  </div>`;
}
function rerenderKind(){ document.getElementById('kind-fields').innerHTML=renderKindFields(window.__p); }
function setKind(k){ window.__p.kind=k; if(k==='configurable'&&!window.__p.typeId)window.__p.typeId='straight'; rerenderKind(); render(); }
function fmt(cmd){ document.execCommand(cmd,false,null); const d=document.getElementById('desc'); if(d)window.__p.desc=d.innerHTML; }
function renderImages(p){ return (p.images||[]).map((im,i)=>`<div class="chip gray" style="padding:8px 12px">🖼️ ${esc(im)} <span style="cursor:pointer" onclick="rmImage(${i})">✕</span></div>`).join('')||'<span class="sub">No images yet.</span>'; }
function addImage(){ window.__p.images=window.__p.images||[]; window.__p.images.push('image-'+(window.__p.images.length+1)+'.jpg'); document.getElementById('img-list').innerHTML=renderImages(window.__p); }
function rmImage(i){ window.__p.images.splice(i,1); document.getElementById('img-list').innerHTML=renderImages(window.__p); }
function toggleFG(gid,pid,on){ const g=store.data.fulfillmentGroups.find(x=>x.id===gid); if(!g)return; g.productIds=g.productIds.filter(x=>x!==pid); if(on)g.productIds.push(pid); store.save(); }
function saveProduct(isNew){
  const p=window.__p;
  if(!p.name||!p.sku){ toast('Name and SKU are required.'); return; }
  if(isNew){ store.data.products.push(p); } else { const i=store.data.products.findIndex(x=>x.id===p.id); if(i>=0)store.data.products[i]=p; }
  store.save(); toast('Product saved'); go('catalog');
}
</script>
<script>
// ---------- 3D duct (CSS) ----------
function duct3d(typeId,spec){
  const t=PART_TYPES[typeId]||PART_TYPES.straight;
  const scale=2.2;
  const w=Math.min(120,(Number(spec.width||spec.topW||spec.diameter||24))*scale);
  const h=Math.min(90,(Number(spec.height||spec.topH||spec.diameter||12))*scale);
  const len=Math.min(200,(Number(spec.length||60))*1.4);
  // simple extruded box representing the part footprint; good enough as a preview
  return `<div class="duct" style="width:${len}px;height:${h}px">
    <div class="face" style="inset:0"></div>
    <div class="face" style="width:${len}px;height:${w}px;transform:rotateX(90deg) translateZ(${h/2}px);top:${-(w-h)/2}px"></div>
    <div class="face" style="width:${w}px;height:${h}px;transform:rotateY(90deg) translateZ(${len/2}px);left:${(len-w)/2}px"></div>
  </div>`;
}

// ---------- Cart ----------
function cartScreen(){
  const s=cartSummary();
  if(!store.data.cart.length){
    return shell('cart',`<h1 class="page">Cart</h1><div class="card"><div class="body empty">
      ${I.cart}<p>Your cart is empty.</p><button class="btn primary" onclick="go('catalog')">Browse products</button></div></div>`);
  }
  const rows=store.data.cart.map(it=>`<tr>
    <td><div style="font-weight:600">${esc(it.name)}</div><div class="sku">${esc(it.sku)}</div>
      ${it.spec?`<div class="spec-line">${esc(specSummary(it.typeId,it.spec))}</div>`:''}
      ${it.kind==='configurable'?`<button class="btn ghost" style="padding:2px 8px;font-size:12px;margin-top:4px" onclick="editLine('${it.id}')">${I.edit} Edit config</button>`:''}</td>
    <td class="r num">${money(it.unitPrice)}</td>
    <td class="c"><span class="qty"><button class="iconbtn" onclick="setQty('${it.id}',-1)">${I.minus}</button><b class="num">${it.qty}</b><button class="iconbtn" onclick="setQty('${it.id}',1)">${I.plus}</button></span></td>
    <td class="r num">${money(it.unitPrice*it.qty)}</td>
    <td class="r num">${(it.unitWeight*it.qty).toFixed(1)} lb</td>
    <td class="r"><button class="iconbtn d" onclick="removeLine('${it.id}')">${I.del}</button></td></tr>`).join('');
  return shell('cart',`<h1 class="page">Cart</h1>
    <div class="card"><table>
      <thead><tr><th>Product</th><th class="r">Unit price</th><th class="c">Qty</th><th class="r">Total</th><th class="r">Weight</th><th></th></tr></thead>
      <tbody>${rows}</tbody></table>
      <div class="body" style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
        <div class="sum-row" style="min-width:240px"><span>Items</span><b class="num">${s.count}</b></div>
        <div class="sum-row" style="min-width:240px"><span>Total weight</span><b class="num">${s.weight} lb</b></div>
        <div class="sum-row grand" style="min-width:240px"><span>Total</span><b class="num">${money(s.price)}</b></div>
      </div>
      <div class="body row" style="justify-content:space-between;padding-top:0">
        <button class="btn ghost" onclick="go('catalog')">${I.back} Continue ordering</button>
        <button class="btn primary" onclick="go('order')">Proceed to order ${I.fwd}</button>
      </div></div>`);
}
function setQty(id,d){ const it=store.data.cart.find(x=>x.id===id); if(!it)return; it.qty=Math.max(1,it.qty+d); store.save(); render(); }
function removeLine(id){ store.data.cart=store.data.cart.filter(x=>x.id!==id); store.save(); render(); }
function editLine(id){ const it=store.data.cart.find(x=>x.id===id); if(!it)return; const p=store.data.products.find(x=>x.id===it.productId)||{id:it.productId,name:it.name,sku:it.sku,typeId:it.typeId}; openConfigurator(p,it.spec,it.id); }
</script>
<script>
// ---------- Submit-order wizard ----------
const wiz={ notifications:[], attachments:[], custom:{}, sections:{} };
function orderScreen(){
  const s=cartSummary();
  if(!store.data.cart.length){
    return shell('order',`<h1 class="page">Submit Order</h1><div class="card"><div class="body empty">
      ${I.order}<p>Add products to your cart before submitting an order.</p><button class="btn primary" onclick="go('catalog')">Browse products</button></div></div>`);
  }
  if(!wiz._init){ wiz.notifications=[]; wiz.attachments=[]; wiz.custom={}; wiz._init=true; }
  const jobOpts=store.data.jobs.map(j=>`<option value="${j.id}">${esc(j.number)} — ${esc(j.name)}</option>`).join('');
  const userOpts=store.data.users.map(u=>`<option value="${u.id}">${esc(u.name)}</option>`).join('');
  const groupOpts=store.data.crews.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('');
  const shipOpts=store.data.shippingOptions.map(o=>`<option>${esc(o)}</option>`).join('');
  return shell('order',`<h1 class="page">Submit Order</h1>
    <div class="order-layout"><div>
      ${section('job','Job',`
        <div class="field" style="margin-bottom:12px"><label>Job</label><select id="o-job"><option value="">— Select a job —</option>${jobOpts}</select></div>
        <div class="grid">
          <div class="field"><label>Job name</label><input id="o-jobname"></div>
          <div class="field"><label>Job number</label><input id="o-jobnum"></div>
          <div class="field"><label>Phase</label><input id="o-phase"></div>
        </div>
        <p class="sub" style="padding:12px 0 4px">Job / shipping address</p>
        <div class="grid">
          <div class="field"><label>Name</label><input id="a-name"></div>
          <div class="field"><label>Street (line 1)</label><input id="a-l1"></div>
          <div class="field"><label>Line 2</label><input id="a-l2"></div>
          <div class="field"><label>Line 3</label><input id="a-l3"></div>
          <div class="field"><label>City</label><input id="a-city"></div>
          <div class="field"><label>State</label><input id="a-state"></div>
          <div class="field"><label>Zip</label><input id="a-zip"></div>
          <div class="field"><label>Country</label><input id="a-country" value="US"></div>
          <div class="field"><label>Phone</label><input id="a-phone"></div>
          <div class="field"><label>Delivery instructions</label><input id="a-instr"></div>
        </div>`)}
      ${section('details','Order details',`<div class="grid">
        <div class="field"><label>PO number</label><input id="o-po"></div>
        <div class="field"><label>Tag</label><input id="o-tag"></div>
        <div class="field"><label>Measured by</label><select id="o-measured"><option value="">—</option>${userOpts}</select></div>
        <div class="field"><label>Ordered for</label><select id="o-orderedfor"><option value="">—</option>${userOpts}</select></div>
        <div class="field"><label>User group</label><select id="o-group"><option value="">—</option>${groupOpts}</select></div>
      </div>`)}
      ${section('dates','Dates',`<div class="grid">
        <div class="field"><label>Ordered date</label><input type="date" id="o-ordered"></div>
        <div class="field"><label>Requested date</label><input type="date" id="o-requested"></div>
      </div>`)}
      ${section('shipping','Shipping',`<div class="grid">
        <div class="field"><label>Shipping option</label><select id="o-ship">${shipOpts}</select></div>
        <div class="field"><label>Delivery window start</label><input type="time" id="o-start" oninput="checkWindow()"></div>
        <div class="field"><label>Delivery window end</label><input type="time" id="o-end" oninput="checkWindow()"></div>
      </div><div class="field err" id="window-err" style="display:none">Delivery window start must be before the end time.</div>`)}
      ${section('instructions','Instructions',`
        <div class="rte-tools"><button onclick="fmtI('bold')"><b>B</b></button><button onclick="fmtI('italic')"><i>I</i></button><button onclick="fmtI('insertUnorderedList')">•</button></div>
        <div class="rte" contenteditable="true" id="o-instr" placeholder="Special instructions…"></div>`)}
      ${section('custom','Additional information',customFieldsHtml())}
      ${section('notifications','Notifications',`<div class="sub" style="padding:0 0 8px">Who should be notified about this order</div>
        <div id="notif-list">${renderNotifs()}</div>
        <button class="btn stroked" onclick="addNotif()">${I.add} Add recipient</button>`)}
      ${section('attachments','Attachments',`<div class="sub" style="padding:0 0 8px">Drawings, cut sheets, or notes (max 25 MB each, up to 20 files)</div>
        <input id="file-in" type="file" style="display:none" onchange="onFilePick(this)">
        <button class="btn stroked" onclick="document.getElementById('file-in').click()">${I.upload} Upload file</button>
        <div class="field err" id="file-err" style="display:none"></div>
        <div id="attach-list" style="margin-top:10px">${renderAttach()}</div>`)}
    </div>
    <div><div class="card summary"><h2>Order summary</h2><div class="body">
      <div class="sum-row"><span>Items</span><b class="num">${s.count}</b></div>
      <div class="sum-row"><span>Weight</span><b class="num">${s.weight} lb</b></div>
      <div class="sum-row grand"><span>Total</span><b class="num">${money(s.price)}</b></div>
      <button class="btn primary full" style="margin-top:16px" onclick="submitOrder()">Submit order</button>
      <button class="btn ghost full" style="margin-top:6px" onclick="go('cart')">Back to cart</button>
    </div></div></div></div>`);
}
function section(id,title,inner){
  const collapsed=wiz.sections[id]===true;
  return `<div class="card section ${collapsed?'collapsed':''}" id="sec-${id}">
    <div class="section-head" onclick="toggleSec('${id}')"><span class="chev">${I.chev}</span><h2>${esc(title)}</h2></div>
    <div class="body">${inner}</div></div>`;
}
function toggleSec(id){ wiz.sections[id]=!wiz.sections[id]; const el=document.getElementById('sec-'+id); if(el)el.classList.toggle('collapsed'); }
function fmtI(cmd){ document.execCommand(cmd,false,null); }
function checkWindow(){
  const a=document.getElementById('o-start').value, b=document.getElementById('o-end').value;
  const err=document.getElementById('window-err');
  err.style.display=(a&&b&&a>=b)?'block':'none';
}
function customFieldsHtml(){
  return '<div class="grid">'+store.data.customFields.map(cf=>{
    if(cf.type==='checkbox') return `<label class="switch"><input type="checkbox" onchange="wiz.custom['${cf.id}']=this.checked"> ${esc(cf.label)}</label>`;
    if(cf.type==='dropdown') return `<div class="field"><label>${esc(cf.label)}</label><select onchange="wiz.custom['${cf.id}']=this.value"><option value="">—</option>${cf.options.map(o=>`<option>${esc(o)}</option>`).join('')}</select></div>`;
    return `<div class="field"><label>${esc(cf.label)}</label><input oninput="wiz.custom['${cf.id}']=this.value"></div>`;
  }).join('')+'</div>';
}
// notifications
function addNotif(){ wiz.notifications.push({type:'email',email:'',userId:'',crewId:''}); document.getElementById('notif-list').innerHTML=renderNotifs(); }
function rmNotif(i){ wiz.notifications.splice(i,1); document.getElementById('notif-list').innerHTML=renderNotifs(); }
function notifChange(i,field,val){ wiz.notifications[i][field]=val; if(field==='type'){document.getElementById('notif-list').innerHTML=renderNotifs();} else {refreshNotifDupes();} }
function notifKey(n){ return n.type==='email'?('email:'+(n.email||'').toLowerCase()):n.type==='user'?('user:'+n.userId):('crew:'+n.crewId); }
function refreshNotifDupes(){ /* re-render to show dupe warnings */ document.getElementById('notif-list').innerHTML=renderNotifs(); }
function renderNotifs(){
  const seen={};
  return wiz.notifications.map((n,i)=>{
    const key=notifKey(n); const dupe=n.type&&(n.email||n.userId||n.crewId)&&seen[key]; seen[key]=true;
    const userOpts=store.data.users.map(u=>`<option value="${u.id}" ${n.userId===u.id?'selected':''}>${esc(u.name)}</option>`).join('');
    const crewOpts=store.data.crews.map(c=>`<option value="${c.id}" ${n.crewId===c.id?'selected':''}>${esc(c.name)}</option>`).join('');
    let inputHtml;
    if(n.type==='email') inputHtml=`<div class="field" style="flex:1;min-width:200px"><label>Email address</label><input type="email" maxlength="255" value="${esc(n.email)}" oninput="notifChange(${i},'email',this.value)">${dupe?'<span class="err">This recipient is already added.</span>':''}</div>`;
    else if(n.type==='user') inputHtml=`<div class="field" style="flex:1;min-width:200px"><label>User</label><select onchange="notifChange(${i},'userId',this.value)"><option value="">—</option>${userOpts}</select>${dupe?'<span class="err">This recipient is already added.</span>':''}</div>`;
    else inputHtml=`<div class="field" style="flex:1;min-width:200px"><label>Crew</label><select onchange="notifChange(${i},'crewId',this.value)"><option value="">—</option>${crewOpts}</select>${dupe?'<span class="err">This recipient is already added.</span>':''}</div>`;
    return `<div class="row" style="margin-bottom:10px">
      <div class="field" style="min-width:120px"><label>Type</label><select onchange="notifChange(${i},'type',this.value)">
        <option value="email" ${n.type==='email'?'selected':''}>Email</option>
        <option value="user" ${n.type==='user'?'selected':''}>User</option>
        <option value="crew" ${n.type==='crew'?'selected':''}>Crew</option></select></div>
      ${inputHtml}
      <button class="iconbtn d" onclick="rmNotif(${i})">${I.del}</button></div>`;
  }).join('');
}
// attachments
const MAX_FILE=25*1024*1024, MAX_COUNT=20;
function onFilePick(input){
  const f=input.files&&input.files[0]; const err=document.getElementById('file-err'); err.style.display='none';
  if(!f)return;
  if(wiz.attachments.length>=MAX_COUNT){ err.textContent='You can attach at most 20 files.'; err.style.display='block'; input.value=''; return; }
  if(f.size>MAX_FILE){ err.textContent='"'+f.name+'" exceeds the 25 MB size limit.'; err.style.display='block'; input.value=''; return; }
  wiz.attachments.push({ name:f.name, size:f.size, note:'' });
  input.value=''; document.getElementById('attach-list').innerHTML=renderAttach();
}
function rmAttach(i){ wiz.attachments.splice(i,1); document.getElementById('attach-list').innerHTML=renderAttach(); }
function attachNote(i,v){ wiz.attachments[i].note=v; }
function renderAttach(){
  if(!wiz.attachments.length) return '<span class="sub">No files attached.</span>';
  return wiz.attachments.map((a,i)=>`<div class="list-item">
    ${I.paper}<div style="flex:1"><div>${esc(a.name)} <span class="sku">${(a.size/1024).toFixed(0)} KB</span></div>
      <input placeholder="Add a note for this file…" value="${esc(a.note)}" oninput="attachNote(${i},this.value)" style="margin-top:4px;font-size:13px;padding:6px 8px;border-radius:7px;border:1px solid var(--line);background:var(--ground);color:var(--ink);width:100%"></div>
    <button class="iconbtn d" onclick="rmAttach(${i})">${I.del}</button></div>`).join('');
}
function submitOrder(){
  // validation: window + notification uniqueness
  const a=document.getElementById('o-start').value, b=document.getElementById('o-end').value;
  if(a&&b&&a>=b){ toast('Fix the delivery window: start must be before end.'); wiz.sections.shipping=false; render(); return; }
  const seen={}; for(const n of wiz.notifications){ const k=notifKey(n); if((n.email||n.userId||n.crewId)&&seen[k]){ toast('Remove duplicate notification recipients.'); return; } seen[k]=true; }
  const s=cartSummary();
  store.data.orderSeq++;
  const number='WD-'+String(store.data.orderSeq).padStart(5,'0');
  const order={ id:uid('ord'), number, createdAt:new Date().toISOString(),
    po:val('o-po'), tag:val('o-tag'), ship:val('o-ship'), requested:val('o-requested'),
    summary:s, lines:structuredCloneSafe(store.data.cart),
    notifications:structuredCloneSafe(wiz.notifications), attachments:structuredCloneSafe(wiz.attachments),
    pricingMessage:'Estimated total '+money(s.price)+' for '+s.count+' item(s).',
    deliveryMessage: val('o-ship')==='Pickup' ? 'Your order will be available for pickup once fabricated.' : (val('o-requested')?('Requested delivery on or around '+val('o-requested')+'.'):'Delivery will be scheduled after fabrication.'),
  };
  store.data.orders.push(order);
  store.data.cart=[]; wiz._init=false; wiz.notifications=[]; wiz.attachments=[]; wiz.custom={}; wiz.sections={};
  store.save();
  go('complete',{id:order.id});
}
function val(id){ const el=document.getElementById(id); return el?el.value:''; }
</script>

function render(){
